<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena – Compete. Climb. Win.</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.backgroundColor = '#fee2e2';
        div.style.color = '#991b1b';
        div.style.padding = '16px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.borderBottom = '4px solid #f87171';
        div.style.whiteSpace = 'pre-wrap';
        div.innerHTML = '<strong>Uncaught Error:</strong> ' + message + '\n' +
                        '<strong>Source:</strong> ' + source + ' (line ' + lineno + ', col ' + colno + ')\n' +
                        '<strong>Stack:</strong> ' + (error && error.stack ? error.stack : 'N/A');
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var message = event.reason && event.reason.message ? event.reason.message : event.reason;
        var stack = event.reason && event.reason.stack ? event.reason.stack : 'N/A';
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.backgroundColor = '#fffbeb';
        div.style.color = '#92400e';
        div.style.padding = '16px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.borderBottom = '4px solid #fbbf24';
        div.style.whiteSpace = 'pre-wrap';
        div.innerHTML = '<strong>Unhandled Promise Rejection:</strong> ' + message + '\n' +
                        '<strong>Stack:</strong> ' + stack;
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/src/main.jsx"></script>
  </body>
</html>
